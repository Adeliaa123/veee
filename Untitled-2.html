<script>
    function calculateResult() {
        const form = document.getElementById('quizForm');
        let score = 0;
        const total = 3;

        const answers = new FormData(form);
        for (let value of answers.values()) {
            if (value === 'correct') score++;
        }

        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `Твой результат: ${score} из ${total}`;
        
        if(score === total) {
            resultDiv.style.color = "#28a745";
            resultDiv.innerHTML += " — Отлично! Ты настоящий прораб ботов! 🤖";
        } else {
            resultDiv.style.color = "#ffc107";
            resultDiv.innerHTML += " — Неплохо, но можно повторить теорию.";
        }
    }
</script>
